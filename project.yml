name: AccDrive
options:
  bundleIdPrefix: com.accdrive
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    # Swift 5 language mode: avoids Swift 6 strict-concurrency build breakage.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Set your Apple Developer Team ID here (required to build/sign on device).
    DEVELOPMENT_TEAM: "2EADP68M95"
    CODE_SIGN_STYLE: Automatic

targets:
  AccDrive:
    type: application
    platform: macOS
    sources:
      - path: AccDrive
      - path: Shared
      - path: Config.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.accdrive.app
        INFOPLIST_FILE: AccDrive/Info.plist
        CODE_SIGN_ENTITLEMENTS: AccDrive/AccDrive.entitlements
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: AccDriveFileProvider
        embed: true

  AccDriveFileProvider:
    type: app-extension
    platform: macOS
    sources:
      - path: AccDriveFileProvider
      - path: Shared
      - path: Config.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.accdrive.app.fileprovider
        INFOPLIST_FILE: AccDriveFileProvider/Info.plist
        CODE_SIGN_ENTITLEMENTS: AccDriveFileProvider/AccDriveFileProvider.entitlements
        GENERATE_INFOPLIST_FILE: NO
